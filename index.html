<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Interviewer — Delivery App Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --surface-2: #f3efe9;
    --text: #1c1917;
    --text-muted: #78716c;
    --border: #e7e0d8;
    --accent: #b45309;
    --accent-hover: #92400e;
    --accent-soft: rgba(180, 83, 9, 0.08);
    --accent-glow: rgba(180, 83, 9, 0.15);
    --error: #dc2626;
    --error-bg: #fef2f2;
    --success: #059669;
    --shadow: 0 4px 32px rgba(28, 25, 23, 0.06);
    --shadow-lg: 0 12px 48px rgba(28, 25, 23, 0.1);
    --font-display: "DM Serif Display", Georgia, serif;
    --font-body: "DM Sans", system-ui, sans-serif;
    --radius: 20px;
    --radius-sm: 12px;
  }
  [data-theme="dark"] {
    --bg: #0c0a09;
    --surface: #1c1917;
    --surface-2: #292524;
    --text: #fafaf9;
    --text-muted: #a8a29e;
    --border: #44403c;
    --accent: #f59e0b;
    --accent-hover: #fbbf24;
    --accent-soft: rgba(245, 158, 11, 0.1);
    --accent-glow: rgba(245, 158, 11, 0.2);
    --error: #f87171;
    --error-bg: #2a1414;
    --shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
    --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.6);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s ease, color 0.3s ease;
  }
  /* Subtle grain texture overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .topbar-actions { display: flex; gap: 10px; }
  [dir="rtl"] body, [dir="rtl"] .app { text-align: right; }
  [dir="rtl"] .actions { justify-content: flex-start !important; }
  [dir="rtl"] .guidelines ul { padding-left: 0; padding-right: 20px; }
  [dir="rtl"] .summary-followup { padding-left: 0; padding-right: 14px; border-left: none; border-right: 2px solid var(--border); }
  [dir="rtl"] .question-text, [dir="rtl"] textarea, [dir="rtl"] .summary-q, [dir="rtl"] .summary-a { font-family: "DM Sans", "Segoe UI", Tahoma, sans-serif; }
  .brand {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 20px;
    letter-spacing: -0.01em;
  }
  .brand span { color: var(--accent); }
  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.25s ease;
    font-family: var(--font-body);
    letter-spacing: 0.01em;
  }
  .theme-toggle:hover { background: var(--surface-2); color: var(--text); border-color: var(--accent); }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  /* Decorative accent line at card top */
  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-hover), var(--accent));
    opacity: 0.7;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 400;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
    line-height: 1.25;
  }
  h2 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    margin: 0 0 12px;
    letter-spacing: -0.005em;
  }
  p { line-height: 1.7; color: var(--text-muted); margin: 0 0 12px; font-size: 15px; }
  .guidelines {
    background: var(--surface-2);
    border-radius: 12px;
    padding: 20px;
    margin: 20px 0 28px;
  }
  .guidelines ul { margin: 0; padding-left: 20px; }
  .guidelines li {
    margin-bottom: 8px;
    color: var(--text-muted);
    line-height: 1.55;
  }
  .guidelines li:last-child { margin-bottom: 0; }

  /* ---------- Enhanced intro screen ---------- */
  .intro-hero {
    text-align: center;
    padding: 8px 0 4px;
    margin-bottom: 24px;
  }
  .intro-emoji {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
    border-radius: var(--radius);
    background: linear-gradient(145deg, var(--accent), #d97706);
    font-size: 40px;
    margin-bottom: 20px;
    box-shadow: 0 12px 36px -8px var(--accent-glow);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .intro-eyebrow {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 16px;
    border: 1px solid var(--accent-glow);
  }
  .intro-hero h1 {
    font-family: var(--font-display);
    font-size: 34px;
    font-weight: 400;
    margin: 0 0 14px;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .intro-hero p.lead {
    font-size: 16px;
    max-width: 50ch;
    margin: 0 auto;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .meta-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 24px 0;
  }
  .meta-pill {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .meta-pill:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .meta-pill .icon {
    width: 42px;
    height: 42px;
    border-radius: var(--radius-sm);
    display: grid;
    place-items: center;
    background: var(--accent-soft);
    font-size: 20px;
    flex-shrink: 0;
  }
  .meta-pill .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    font-weight: 600;
  }
  .meta-pill .value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-top: 2px;
  }

  .guideline-section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 8px 0 14px;
  }
  .guideline-section-title::before,
  .guideline-section-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .guideline-grid {
    display: grid;
    gap: 12px;
    margin-bottom: 28px;
  }
  .guideline-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
  }
  .guideline-item:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--accent-glow);
  }
  .guideline-item .g-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 18px;
    background: var(--accent-soft);
    border: none;
  }
  .guideline-item .g-body {
    flex: 1;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-muted);
  }
  .guideline-item .g-title {
    display: block;
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
  }

  .start-btn {
    width: 100%;
    padding: 16px 24px;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .start-btn .arrow {
    transition: transform 0.2s;
  }
  .start-btn:hover .arrow { transform: translateX(4px); }
  [dir="rtl"] .start-btn:hover .arrow { transform: translateX(-4px); }
  [dir="rtl"] .start-btn .arrow { transform: scaleX(-1); }

  @media (max-width: 540px) {
    .meta-row { grid-template-columns: 1fr; }
    .intro-hero h1 { font-size: 24px; }
    .app { padding: 20px 12px 60px; }
    .card { padding: 24px 16px; }
    h1 { font-size: 22px; }
    .question-text { font-size: 17px; }
    .input-row { flex-direction: column; }
    .mic-btn { width: 100%; height: 44px; border-radius: 10px; margin-top: 0; }
    .topbar { flex-wrap: wrap; gap: 8px; }
    .theme-toggle { padding: 6px 10px; font-size: 13px; }
    .guideline-item { padding: 12px; gap: 10px; }
    .start-btn { padding: 14px 20px; font-size: 15px; }
    .analysis-card { padding: 14px 16px; }
    .modal-content { padding: 20px 16px; }
  }
  @media (max-width: 380px) {
    .intro-hero h1 { font-size: 20px; }
    .brand { font-size: 16px; }
    .meta-pill { padding: 10px 12px; }
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 13px 26px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: var(--font-body);
    letter-spacing: 0.01em;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow); }
  .btn:active { transform: translateY(1px); box-shadow: none; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
  .progress-wrap {
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow);
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .progress-count {
    background: var(--surface-2);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .progress-bar {
    height: 10px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-hover));
    width: 0%;
    transition: width 0.45s cubic-bezier(.4,0,.2,1);
    border-radius: 999px;
    min-width: 12px;
  }
  .question-block {
    margin-bottom: 20px;
  }
  .question-text {
    font-family: var(--font-display);
    font-size: 21px;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 8px;
    color: var(--text);
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    resize: vertical;
    transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    line-height: 1.6;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: var(--surface);
  }
  textarea.error {
    border-color: var(--error);
    background: var(--error-bg);
  }
  .error-msg {
    color: var(--error);
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }
  .error-msg.show { display: block; }
  .actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 18px;
  }
  .typing {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 16px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .typing-dots { display: inline-flex; gap: 4px; }
  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }
  .summary-item {
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-q {
    font-weight: 600;
    margin-bottom: 6px;
  }
  .summary-a {
    color: var(--text-muted);
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .summary-followup {
    margin-top: 10px;
    padding-left: 14px;
    border-left: 2px solid var(--border);
  }
  .storage-note {
    background: var(--surface-2);
    border-radius: 12px;
    padding: 20px;
    margin-top: 24px;
    font-size: 14px;
  }
  .storage-note h3 { margin: 0 0 10px; font-size: 15px; }
  .storage-note pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    font-size: 12px;
    margin: 10px 0 0;
    color: var(--text);
  }
  .save-status {
    padding: 12px 14px;
    border-radius: 10px;
    margin: 16px 0;
    font-size: 14px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-muted);
  }
  .save-status.success {
    border-color: var(--success);
    color: var(--success);
    background: var(--surface-2);
  }
  .save-status.failed {
    border-color: var(--error);
    color: var(--error);
    background: var(--error-bg);
  }
  .api-error {
    background: var(--error-bg);
    border: 1px solid var(--error);
    color: var(--error);
    padding: 12px 14px;
    border-radius: 10px;
    margin-top: 14px;
    font-size: 14px;
  }

  /* ---------- Voice input ---------- */
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .input-row textarea { flex: 1; }
  .mic-btn {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--surface-2);
    color: var(--text-muted);
    cursor: pointer;
    display: grid;
    place-items: center;
    font-size: 20px;
    flex-shrink: 0;
    transition: all 0.25s ease;
    margin-top: 2px;
  }
  .mic-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .mic-btn.recording {
    background: var(--error);
    border-color: var(--error);
    color: #fff;
    animation: pulse-mic 1.2s infinite ease-in-out;
  }
  .mic-btn.unsupported { opacity: 0.3; cursor: not-allowed; }
  @keyframes pulse-mic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
    50% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
  }

  /* ---------- AI Analysis summary ---------- */
  .analysis-section {
    margin: 20px 0;
  }
  .analysis-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px 22px;
    margin-bottom: 14px;
    transition: transform 0.2s ease;
  }
  .analysis-card:hover { transform: translateY(-1px); }
  .analysis-card h3 {
    font-family: var(--font-display);
    margin: 0 0 10px;
    font-size: 17px;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .analysis-card ul {
    margin: 0;
    padding-left: 18px;
  }
  .analysis-card li {
    margin-bottom: 6px;
    line-height: 1.55;
    color: var(--text-muted);
  }
  .analysis-card li:last-child { margin-bottom: 0; }
  .analysis-card p {
    margin: 0;
    line-height: 1.6;
  }
  .analysis-loading {
    text-align: center;
    padding: 30px 0;
    color: var(--text-muted);
    font-size: 15px;
  }
  .analysis-loading .typing-dots {
    display: inline-flex;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* ---------- Screen transitions ---------- */
  .screen {
    transition: opacity 0.35s ease, transform 0.35s ease;
    opacity: 1;
    transform: translateY(0);
  }
  .screen-exit {
    opacity: 0;
    transform: translateY(-12px);
    pointer-events: none;
  }
  .screen-enter {
    opacity: 0;
    transform: translateY(12px);
  }

  /* ---------- Loading skeleton ---------- */
  .skeleton { padding: 8px 0; }
  .skeleton-line {
    height: 16px;
    margin-bottom: 12px;
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    border-radius: 8px;
    animation: shimmer 1.5s infinite ease-in-out;
  }
  .skeleton-line:last-child { margin-bottom: 0; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ---------- Secondary button ---------- */
  .btn-secondary {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    padding: 11px 22px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: var(--font-body);
    letter-spacing: 0.01em;
  }
  .btn-secondary:hover { background: var(--accent-soft); color: var(--accent-hover); border-color: var(--accent-hover); }

  /* ---------- History section ---------- */
  .history-section {
    margin-top: 28px;
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .history-header h2 { margin: 0; }
  .clear-history-btn {
    background: none;
    border: none;
    color: var(--error);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
    font-family: inherit;
  }
  .clear-history-btn:hover { background: var(--error-bg); }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .history-item:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
  .history-item .h-info { flex: 1; }
  .history-item .h-date { font-size: 14px; font-weight: 600; color: var(--text); }
  .history-item .h-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .history-item .h-arrow { color: var(--text-muted); font-size: 18px; margin-left: 12px; }
  [dir="rtl"] .history-item .h-arrow { margin-left: 0; margin-right: 12px; transform: scaleX(-1); }

  /* ---------- Modal overlay ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28, 25, 23, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;

let currentLang = localStorage.getItem("lang") || "en";
function t() { return I18N[currentLang]; }

// State — adaptive conversation history
const state = {
  history: [],          // [{ question, answer }]
  currentQuestion: "",  // the question currently displayed
  done: false           // AI signals interview is complete
};

// Theme
const themeToggle = document.getElementById("themeToggle");
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  themeToggle.textContent = theme === "dark" ? t().lightMode : t().darkMode;
  localStorage.setItem("theme", theme);
}
applyTheme(localStorage.getItem("theme") || "light");
themeToggle.addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  applyTheme(cur === "dark" ? "light" : "dark");
});

// Language
const langToggle = document.getElementById("langToggle");
function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem("lang", lang);
  document.documentElement.setAttribute("lang", lang);
  document.documentElement.setAttribute("dir", t().dir);
  langToggle.textContent = t().langToggle;
  // Update theme toggle label in new language
  const curTheme = document.documentElement.getAttribute("data-theme") || "light";
  themeToggle.textContent = curTheme === "dark" ? t().lightMode : t().darkMode;
  // Translate static elements
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t()[key] != null) el.textContent = t()[key];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const key = el.getAttribute("data-i18n-html");
    if (t()[key] != null) el.innerHTML = t()[key];
  });
  if (answerInput) answerInput.placeholder = t().placeholder;
  if (typingText) typingText.textContent = t().typing;
  // Re-render whichever screen is visible
  if (!interviewScreen.classList.contains("hidden")) renderQuestion();
}
langToggle.addEventListener("click", () => {
  applyLang(currentLang === "en" ? "ar" : "en");
});

// Screens
const introScreen = document.getElementById("introScreen");
const interviewScreen = document.getElementById("interviewScreen");
const summaryScreen = document.getElementById("summaryScreen");

// Interview elements
const questionText = document.getElementById("questionText");
const answerInput = document.getElementById("answerInput");
const errorMsg = document.getElementById("errorMsg");
const apiError = document.getElementById("apiError");
const nextBtn = document.getElementById("nextBtn");
const typingIndicator = document.getElementById("typingIndicator");
const typingText = document.getElementById("typingText");
const answerArea = document.getElementById("answerArea");
const progressFill = document.getElementById("progressFill");
const progressLabel = document.getElementById("progressLabel");
const questionSkeleton = document.getElementById("questionSkeleton");

// Screen transition helper
function switchScreen(from, to, cb) {
  from.classList.add("screen-exit");
  setTimeout(() => {
    from.classList.add("hidden");
    from.classList.remove("screen-exit");
    to.classList.remove("hidden");
    to.classList.add("screen-enter");
    requestAnimationFrame(() => {
      requestAnimationFrame(() => to.classList.remove("screen-enter"));
    });
    if (cb) cb();
  }, 350);
}

// Initialize language (after elements exist)
applyLang(currentLang);

document.getElementById("startBtn").addEventListener("click", async () => {
  switchScreen(introScreen, interviewScreen);
  // Show skeleton while generating first question
  answerArea.classList.add("hidden");
  questionText.classList.add("hidden");
  questionSkeleton.classList.remove("hidden");
  typingIndicator.classList.add("hidden");
  updateProgress();
  try {
    const firstQ = await generateNextQuestion();
    state.currentQuestion = firstQ;
  } catch (e) {
    // Fallback to a default first question
    state.currentQuestion = currentLang === "ar"
      ? "قولي عن آخر مرة طلبت أكل من تطبيق توصيل — وش طلبت؟"
      : "Tell me about the last time you ordered food from a delivery app — what did you get?";
  }
  questionSkeleton.classList.add("hidden");
  questionText.classList.remove("hidden");
  answerArea.classList.remove("hidden");
  renderQuestion();
});

document.getElementById("restartBtn").addEventListener("click", () => {
  state.history = [];
  state.currentQuestion = "";
  state.done = false;
  state.lastAnalysis = null;
  switchScreen(summaryScreen, introScreen, renderHistoryList);
});

function updateProgress() {
  const answered = state.history.length;
  const cur = answered + 1; // current question number
  const total = MAX_QUESTIONS;
  const pct = Math.min((cur / total) * 100, 100);
  progressFill.style.width = `${pct}%`;
  progressLabel.textContent = t().progress(Math.min(cur, total), total);
  const countEl = document.getElementById("progressCount");
  if (countEl) countEl.textContent = `${Math.min(cur, total)} / ~${total}`;
}

function renderQuestion() {
  updateProgress();
  apiError.classList.add("hidden");
  errorMsg.classList.remove("show");
  answerInput.classList.remove("error");
  answerInput.placeholder = t().placeholder;
  answerInput.disabled = false;
  nextBtn.disabled = false;

  questionText.textContent = state.currentQuestion;

  // Show "Finish" if we're near the end
  const nearEnd = state.history.length >= MAX_QUESTIONS - 1;
  nextBtn.textContent = nearEnd ? t().finishBtn : t().nextBtn;
  answerInput.value = "";
  answerInput.focus();
}

nextBtn.addEventListener("click", handleNext);
answerInput.addEventListener("input", () => {
  if (answerInput.value.trim()) {
    answerInput.classList.remove("error");
    errorMsg.classList.remove("show");
  }
});

// --- Voice input (Web Speech API) ---
const micBtn = document.getElementById("micBtn");
let recognition = null;
let isRecording = false;

if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add("recording");
    answerInput.placeholder = t().micListening || "Listening…";
  };
  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove("recording");
    answerInput.placeholder = t().placeholder;
  };
  recognition.onerror = () => {
    isRecording = false;
    micBtn.classList.remove("recording");
    answerInput.placeholder = t().placeholder;
  };
  recognition.onresult = (e) => {
    let transcript = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    answerInput.value = transcript;
    answerInput.classList.remove("error");
    errorMsg.classList.remove("show");
  };

  micBtn.addEventListener("click", () => {
    if (isRecording) {
      recognition.stop();
    } else {
      recognition.lang = currentLang === "ar" ? "ar-SA" : "en-US";
      recognition.start();
    }
  });
} else {
  micBtn.classList.add("unsupported");
  micBtn.title = t().micUnsupported || "Voice input not supported";
  micBtn.addEventListener("click", () => {});
}

async function handleNext() {
  const answer = answerInput.value.trim();
  if (!answer) {
    answerInput.classList.add("error");
    errorMsg.textContent = t().emptyError;
    errorMsg.classList.add("show");
    return;
  }
  // Stop any active recording
  if (isRecording && recognition) recognition.stop();
  answerInput.value = "";

  // Save Q&A to history
  state.history.push({ question: state.currentQuestion, answer });

  // Show skeleton while AI generates next question
  answerArea.classList.add("hidden");
  questionText.classList.add("hidden");
  questionSkeleton.classList.remove("hidden");

  try {
    const nextQ = await generateNextQuestion();
    if (nextQ === "DONE" || state.history.length >= MAX_QUESTIONS) {
      questionSkeleton.classList.add("hidden");
      questionText.classList.remove("hidden");
      answerArea.classList.remove("hidden");
      finishInterview();
      return;
    }
    state.currentQuestion = nextQ;
  } catch (err) {
    console.error(err);
    if (state.history.length >= 3) {
      questionSkeleton.classList.add("hidden");
      questionText.classList.remove("hidden");
      answerArea.classList.remove("hidden");
      finishInterview();
      return;
    }
    state.currentQuestion = currentLang === "ar"
      ? "قولي أكثر عن تجربتك مع التطبيق."
      : "Tell me more about your experience with the app.";
    apiError.textContent = t().apiErrorMsg;
    apiError.classList.remove("hidden");
  }

  questionSkeleton.classList.add("hidden");
  questionText.classList.remove("hidden");
  answerArea.classList.remove("hidden");
  renderQuestion();
}

async function generateNextQuestion() {
  const transcript = state.history.map((h, i) =>
    `Q${i + 1}: ${h.question}\nA${i + 1}: ${h.answer}`
  ).join("\n\n");

  const questionCount = state.history.length;
  const remaining = MAX_QUESTIONS - questionCount;

  const langInst = currentLang === "ar"
    ? "Write in Saudi Arabic dialect (casual, natural, not formal MSA). Example: 'وش الشي اللي ضايقك بالضبط؟'"
    : "Write in casual, conversational English.";

  const prompt = `You are a smart AI interviewer conducting a qualitative user research interview about food delivery app experiences. You are like a friendly coach having a natural conversation.

Topic: Food delivery apps (ordering, choosing restaurants, food quality, app UX, delivery experience)

${transcript ? "Conversation so far:\n\n" + transcript + "\n\n" : "This is the START of the interview. Ask the very first question.\n\n"}Questions asked so far: ${questionCount}
Questions remaining: ~${remaining}

Your task:
${remaining <= 0
  ? "The interview has enough data. Respond with exactly: DONE"
  : `Generate the NEXT single interview question. Rules:
- Ask ONE short, clear, specific question (one sentence max)
- Base your question on what the user said — dive deeper into interesting or vague points
- Do NOT repeat or rephrase any previous question
- Do NOT ask leading questions or suggest answers
- Be specific (ask about actual food, a specific moment, a screen in the app, timing, emotions)
- ${remaining <= 1 ? "This is the last question — make it a good closing question about what they'd change." : "Make the conversation feel natural and adaptive, not scripted."}
- ${langInst}
- Output ONLY the question text. No numbering, no preamble, no quotes.`}`;

  const res = await fetch(GEMINI_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
    })
  });
  if (!res.ok) throw new Error(`Gemini API error: ${res.status}`);
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
  if (/^done$/i.test(text)) return "DONE";
  return text.replace(/^["'`]|["'`]$/g, "").replace(/^\d+[\.\)]\s*/, "").trim();
}

function finishInterview() {
  progressFill.style.width = "100%";
  switchScreen(interviewScreen, summaryScreen);
  submitToSheet();
  generateAnalysis();
}

async function submitToSheet() {
  const statusEl = document.getElementById("saveStatus");
  statusEl.className = "save-status";
  statusEl.classList.remove("hidden");
  statusEl.textContent = t().savingSheet;

  const payload = {
    interviewId: (crypto.randomUUID && crypto.randomUUID()) ||
                 (Date.now() + "-" + Math.random().toString(36).slice(2)),
    topic: "Delivery app",
    language: currentLang,
    createdAt: new Date().toISOString(),
    completed: true,
    responses: state.history.map((h, i) => ({
      questionId: i + 1,
      question: h.question,
      answer: h.answer,
      followUps: []
    }))
  };

  try {
    // Use text/plain to avoid CORS preflight; Apps Script reads e.postData.contents
    await fetch(SHEET_WEBHOOK_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    // no-cors gives an opaque response — we can't read status, but the request is sent
    statusEl.className = "save-status success";
    statusEl.textContent = t().savedSheet;
  } catch (err) {
    console.error("Sheet submission failed:", err);
    statusEl.className = "save-status failed";
    statusEl.textContent = t().saveFailed;
  }
}

async function generateAnalysis() {
  const loading = document.getElementById("analysisLoading");
  const result = document.getElementById("analysisResult");
  loading.classList.remove("hidden");
  result.classList.add("hidden");

  // Build the interview transcript for the AI
  const transcript = state.history.map((h, i) =>
    `Q${i + 1}: ${h.question}\nAnswer: ${h.answer}`
  ).join("\n\n");

  const langInst = currentLang === "ar"
    ? "Respond entirely in Saudi Arabic dialect (casual, clear, not formal MSA)."
    : "Respond in English.";

  const prompt = `You are a friendly AI coach analyzing a user interview about food delivery app experiences.

Here is the full interview transcript:

${transcript}

Based on these answers, provide a structured analysis with exactly these 4 sections:

1. **Summary**: A 2-3 sentence overview of the user's delivery app experience and perspective.
2. **Key Strengths**: 2-3 bullet points about what the user values or does well as a delivery app customer (e.g. knows what they want, gives detailed feedback, tries different options).
3. **Areas for Improvement**: 2-3 bullet points about pain points or challenges the user faces that could be addressed.
4. **Recommendations**: 2-3 actionable suggestions tailored to this user's specific experience.

${langInst}

Format your response as JSON with this exact structure (no markdown, no code blocks, just raw JSON):
{"summary":"...","strengths":["...","..."],"improvements":["...","..."],"recommendations":["...","..."]}`;

  try {
    if (GEMINI_API_KEY === "YOUR_GEMINI_API_KEY_HERE") throw new Error("No API key");

    const res = await fetch(GEMINI_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
      })
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    let raw = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
    // Strip markdown code fences if present
    raw = raw.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "");
    const analysis = JSON.parse(raw);
    state.lastAnalysis = analysis;

    loading.classList.add("hidden");
    result.classList.remove("hidden");
    result.innerHTML = `
      <div class="analysis-card">
        <h3>📋 ${escapeHtml(t().analysisSummary)}</h3>
        <p>${escapeHtml(analysis.summary)}</p>
      </div>
      <div class="analysis-card">
        <h3>💪 ${escapeHtml(t().analysisStrengths)}</h3>
        <ul>${(analysis.strengths || []).map(s => `<li>${escapeHtml(s)}</li>`).join("")}</ul>
      </div>
      <div class="analysis-card">
        <h3>🎯 ${escapeHtml(t().analysisImprovements)}</h3>
        <ul>${(analysis.improvements || []).map(s => `<li>${escapeHtml(s)}</li>`).join("")}</ul>
      </div>
      <div class="analysis-card">
        <h3>💡 ${escapeHtml(t().analysisRecommendations)}</h3>
        <ul>${(analysis.recommendations || []).map(s => `<li>${escapeHtml(s)}</li>`).join("")}</ul>
      </div>
    `;
    saveInterviewToHistory(analysis);
  } catch (err) {
    console.error("Analysis failed:", err);
    state.lastAnalysis = null;
    loading.classList.add("hidden");
    result.classList.remove("hidden");
    const qLabel = currentLang === "ar" ? "س" : "Q";
    result.innerHTML = `
      <div class="analysis-card">
        <h3>📋 ${escapeHtml(t().analysisSummary)}</h3>
        <p style="color:var(--text-muted);font-size:13px;margin-bottom:12px">${escapeHtml(t().analysisError)}</p>
        ${state.history.map((h, i) => `
          <p><strong>${qLabel}${i + 1}.</strong> ${escapeHtml(h.question)}</p>
          <p style="color:var(--text-muted)">${escapeHtml(h.answer)}</p>
        `).join("")}
      </div>
    `;
    saveInterviewToHistory(null);
  }
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// --- Interview history (localStorage) ---
const MAX_HISTORY = 20;
function loadHistory() {
  try { return JSON.parse(localStorage.getItem("interviewHistory")) || []; }
  catch { return []; }
}

function saveInterviewToHistory(analysis) {
  const list = loadHistory();
  list.unshift({
    id: (crypto.randomUUID && crypto.randomUUID()) || Date.now().toString(36),
    date: new Date().toISOString(),
    language: currentLang,
    questionCount: state.history.length,
    history: [...state.history],
    analysis: analysis || null
  });
  if (list.length > MAX_HISTORY) list.length = MAX_HISTORY;
  localStorage.setItem("interviewHistory", JSON.stringify(list));
}

function renderHistoryList() {
  const section = document.getElementById("historySection");
  const list = document.getElementById("historyList");
  const items = loadHistory();
  if (!items.length) { section.classList.add("hidden"); return; }
  section.classList.remove("hidden");
  list.innerHTML = items.map((item, idx) => {
    const d = new Date(item.date);
    const dateStr = d.toLocaleDateString(currentLang === "ar" ? "ar-SA" : "en-US", {
      year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
    });
    return `<div class="history-item" data-idx="${idx}">
      <div class="h-info">
        <div class="h-date">${escapeHtml(dateStr)}</div>
        <div class="h-meta">${item.questionCount} ${escapeHtml(t().historyQuestions)} · ${item.language.toUpperCase()}</div>
      </div>
      <div class="h-arrow">›</div>
    </div>`;
  }).join("");
  list.querySelectorAll(".history-item").forEach(el => {
    el.addEventListener("click", () => openHistoryModal(items[+el.dataset.idx]));
  });
}

// Modal
const historyModal = document.getElementById("historyModal");
let modalInterviewData = null;

function openHistoryModal(interview) {
  modalInterviewData = interview;
  const d = new Date(interview.date);
  const dateStr = d.toLocaleDateString(currentLang === "ar" ? "ar-SA" : "en-US", {
    year: "numeric", month: "long", day: "numeric", hour: "2-digit", minute: "2-digit"
  });
  document.getElementById("modalTitle").textContent = dateStr;
  document.getElementById("modalMeta").textContent =
    `${interview.questionCount} ${t().historyQuestions} · ${interview.language.toUpperCase()}`;

  const qLabel = interview.language === "ar" ? "س" : "Q";
  document.getElementById("modalTranscript").innerHTML = interview.history.map((h, i) => `
    <div class="summary-item">
      <div class="summary-q">${qLabel}${i + 1}. ${escapeHtml(h.question)}</div>
      <div class="summary-a">${escapeHtml(h.answer)}</div>
    </div>
  `).join("");

  const analysisEl = document.getElementById("modalAnalysis");
  if (interview.analysis) {
    const a = interview.analysis;
    analysisEl.innerHTML = `
      <div class="analysis-card"><h3>📋 ${escapeHtml(t().analysisSummary)}</h3><p>${escapeHtml(a.summary)}</p></div>
      <div class="analysis-card"><h3>💪 ${escapeHtml(t().analysisStrengths)}</h3><ul>${(a.strengths||[]).map(s=>`<li>${escapeHtml(s)}</li>`).join("")}</ul></div>
      <div class="analysis-card"><h3>🎯 ${escapeHtml(t().analysisImprovements)}</h3><ul>${(a.improvements||[]).map(s=>`<li>${escapeHtml(s)}</li>`).join("")}</ul></div>
      <div class="analysis-card"><h3>💡 ${escapeHtml(t().analysisRecommendations)}</h3><ul>${(a.recommendations||[]).map(s=>`<li>${escapeHtml(s)}</li>`).join("")}</ul></div>
    `;
  } else {
    analysisEl.innerHTML = "";
  }

  historyModal.classList.remove("hidden");
  requestAnimationFrame(() => historyModal.classList.add("open"));
}

function closeHistoryModal() {
  historyModal.classList.remove("open");
  setTimeout(() => historyModal.classList.add("hidden"), 300);
  modalInterviewData = null;
}

document.getElementById("modalClose").addEventListener("click", closeHistoryModal);
historyModal.addEventListener("click", (e) => { if (e.target === historyModal) closeHistoryModal(); });

document.getElementById("clearHistoryBtn").addEventListener("click", () => {
  if (confirm(t().clearHistoryConfirm)) {
    localStorage.removeItem("interviewHistory");
    renderHistoryList();
  }
});

// --- Export as text ---
function buildExportText(interview) {
  const lang = interview.language || "en";
  const isAr = lang === "ar";
  const d = new Date(interview.date);
  const dateStr = d.toLocaleDateString(isAr ? "ar-SA" : "en-US", {
    year: "numeric", month: "long", day: "numeric", hour: "2-digit", minute: "2-digit"
  });

  let txt = "";
  if (isAr) txt += "\uFEFF"; // UTF-8 BOM for Arabic
  txt += `AI Interviewer — ${isAr ? "نص المقابلة" : "Transcript"}\n`;
  txt += `${isAr ? "التاريخ" : "Date"}: ${dateStr}\n`;
  txt += `${isAr ? "اللغة" : "Language"}: ${lang.toUpperCase()}\n`;
  txt += `${isAr ? "الأسئلة" : "Questions"}: ${interview.questionCount}\n`;
  txt += "================================\n\n";

  const qLabel = isAr ? "س" : "Q";
  const aLabel = isAr ? "ج" : "A";
  interview.history.forEach((h, i) => {
    txt += `${qLabel}${i + 1}: ${h.question}\n`;
    txt += `${aLabel}${i + 1}: ${h.answer}\n\n`;
  });

  if (interview.analysis) {
    const a = interview.analysis;
    txt += "================================\n";
    txt += `${isAr ? "التحليل" : "AI ANALYSIS"}\n`;
    txt += "================================\n\n";
    txt += `${isAr ? "الملخّص" : "Summary"}:\n${a.summary}\n\n`;
    txt += `${isAr ? "نقاط القوة" : "Key Strengths"}:\n${(a.strengths||[]).map(s => `- ${s}`).join("\n")}\n\n`;
    txt += `${isAr ? "نقاط التحسين" : "Areas for Improvement"}:\n${(a.improvements||[]).map(s => `- ${s}`).join("\n")}\n\n`;
    txt += `${isAr ? "التوصيات" : "Recommendations"}:\n${(a.recommendations||[]).map(s => `- ${s}`).join("\n")}\n`;
  }
  return txt;
}

function downloadText(text, filename) {
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Export current interview from summary screen
document.getElementById("exportBtn").addEventListener("click", () => {
  const interview = {
    date: new Date().toISOString(),
    language: currentLang,
    questionCount: state.history.length,
    history: [...state.history],
    analysis: state.lastAnalysis || null
  };
  const dateSlug = new Date().toISOString().slice(0, 10);
  downloadText(buildExportText(interview), `interview-${dateSlug}.txt`);
});

// Export from modal
document.getElementById("modalExportBtn").addEventListener("click", () => {
  if (!modalInterviewData) return;
  const dateSlug = new Date(modalInterviewData.date).toISOString().slice(0, 10);
  downloadText(buildExportText(modalInterviewData), `interview-${dateSlug}.txt`);
});

// Initialize history on page load
renderHistoryList();
</script>
